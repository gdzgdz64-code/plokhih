backend:
  name: github
  repo: gdzgdz64-code/plokhih
  branch: main
  base_url: https://plokhih.vercel.app
  auth_endpoint: /api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Настройки сайта"
    files:
      - name: "home"
        label: "Главная"
        file: "data/home.json"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Описание", name: "description", widget: "text" }

  - name: "club_achievements"
    label: "Достижения клуба"
    files:
      - name: "club"
        label: "Медали, звания и даны"
        file: "data/club-achievements.json"
        fields:
          - label: "Медали"
            name: "medals"
            widget: "list"
            fields:
              - { label: "Название", name: "label", widget: "string" }
              - { label: "Количество", name: "count", widget: "number", value_type: "int" }
              - { label: "Иконка", name: "icon", widget: "string" }
              - { label: "Градиент", name: "gradient", widget: "string" }
          - label: "Звания"
            name: "titles"
            widget: "list"
            fields:
              - { label: "Название", name: "label", widget: "string" }
              - { label: "Количество", name: "count", widget: "number", value_type: "int" }
              - { label: "Иконка", name: "icon", widget: "string" }
              - { label: "Градиент", name: "gradient", widget: "string" }
          - label: "Даны"
            name: "dans"
            widget: "list"
            fields:
              - { label: "Название", name: "label", widget: "string" }
              - { label: "Количество", name: "count", widget: "number", value_type: "int" }
              - { label: "Иконка", name: "icon", widget: "string" }
              - { label: "Градиент", name: "gradient", widget: "string" }

  - name: "events"
    label: "События"
    folder: "data/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime" }
      - { label: "Описание", name: "description", widget: "text" }
      - { label: "Картинка", name: "image", widget: "image" }
